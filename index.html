<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerWorld | Форум</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:      #080b10;
  --surface: #0d1117;
  --card:    #111820;
  --border:  #1e2d3d;
  --accent:  #00d4ff;
  --accent2: #0090b3;
  --gold:    #f0a500;
  --danger:  #e03c3c;
  --success: #1db96a;
  --text:    #c9d1d9;
  --muted:   #4a5568;
  --heading: #e6edf3;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,180,255,.07), transparent),
    repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,212,255,.015) 40px, rgba(0,212,255,.015) 41px),
    repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,212,255,.015) 40px, rgba(0,212,255,.015) 41px);
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent2)}

/* NAV */
.navbar{
  display:flex;align-items:center;justify-content:space-between;
  height:60px;padding:0 20px;
  background:rgba(13,17,23,.96);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.logo{
  font-family:'Rajdhani',sans-serif;
  font-size:1.4rem;font-weight:700;letter-spacing:3px;
  color:var(--accent);text-transform:uppercase;
  text-shadow:0 0 20px rgba(0,212,255,.4);
}
.logo span{color:var(--heading)}
#menuToggle{
  background:none;border:1px solid var(--border);
  border-radius:6px;cursor:pointer;padding:7px 9px;
  display:flex;flex-direction:column;gap:4px;transition:border-color .2s;
}
#menuToggle:hover{border-color:var(--accent)}
#menuToggle span{display:block;width:20px;height:1.5px;background:var(--text);transition:.2s}

/* OVERLAY + SIDE MENU */
#menuOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px)}
#menuOverlay.open{display:block}
#sideMenu{
  position:fixed;top:0;left:-300px;width:300px;height:100vh;
  background:var(--surface);border-right:1px solid var(--border);
  z-index:300;transition:left .3s cubic-bezier(.4,0,.2,1);
  padding:24px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;
}
#sideMenu.open{left:0}
.side-logo{
  font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;
  letter-spacing:3px;color:var(--accent);text-transform:uppercase;
  padding-bottom:16px;border-bottom:1px solid var(--border);
}
.side-label{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:500;margin-top:4px}
#userInfo{font-size:.82rem;color:var(--text);word-break:break-all;line-height:1.6}
.menu-btn{
  width:100%;padding:10px 14px;background:transparent;color:var(--text);
  border:1px solid var(--border);border-radius:6px;cursor:pointer;
  font-size:.88rem;font-family:'Inter',sans-serif;text-align:left;transition:all .2s;
}
.menu-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.05)}
.menu-btn.red{border-color:var(--danger);color:var(--danger)}
.menu-btn.red:hover{background:rgba(224,60,60,.1)}
.side-hr{border:none;border-top:1px solid var(--border);margin:2px 0}
.donate-badge-inline{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(240,165,0,.12);border:1px solid rgba(240,165,0,.3);
  border-radius:4px;padding:2px 7px;font-size:.68rem;
  font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;
  color:var(--gold);text-transform:uppercase;
}

/* TABS */
.tabs{
  display:flex;padding:0 16px;
  background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;
}
.tabs::-webkit-scrollbar{height:0}
.tab-btn{
  padding:14px 16px;border:none;background:transparent;color:var(--muted);
  cursor:pointer;font-size:.78rem;font-family:'Rajdhani',sans-serif;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* MAIN */
#mainContent{max-width:920px;margin:0 auto;padding:28px 20px}

.sec-h{margin-bottom:22px}
.sec-h h2{
  font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--heading);margin-bottom:3px;
}
.sec-h .sub{font-size:.78rem;color:var(--muted)}

.panel{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:20px;margin-bottom:16px;
}
.panel-label{
  font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;
}

/* INPUTS */
.input-field{
  width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:.88rem;font-family:'Inter',sans-serif;
  margin-bottom:10px;resize:vertical;outline:none;transition:border-color .2s;
}
.input-field:focus{border-color:var(--accent)}
.input-field::placeholder{color:var(--muted)}
select.input-field{cursor:pointer;resize:none}

/* BUTTONS */
.btn-primary{
  padding:10px 22px;background:var(--accent);color:#000;
  border:none;border-radius:6px;cursor:pointer;
  font-size:.78rem;font-family:'Rajdhani',sans-serif;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  transition:all .2s;
}
.btn-primary:hover{background:#00b8e0}
.btn-secondary{
  padding:9px 18px;background:transparent;color:var(--accent);border:1px solid var(--accent);
  border-radius:6px;cursor:pointer;font-size:.75rem;font-family:'Rajdhani',sans-serif;
  font-weight:600;letter-spacing:1.5px;text-transform:uppercase;transition:all .2s;
}
.btn-secondary:hover{background:rgba(0,212,255,.1)}
.btn-sm{
  padding:5px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:5px;cursor:pointer;font-size:.72rem;font-family:'Rajdhani',sans-serif;
  font-weight:600;letter-spacing:1px;text-transform:uppercase;
  transition:all .2s;display:inline-block;margin-top:6px;margin-right:4px;
}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.g:hover{border-color:var(--success);color:var(--success)}
.btn-sm.r:hover{border-color:var(--danger);color:var(--danger)}
.btn-sm.y:hover{border-color:var(--gold);color:var(--gold)}

/* REPORT CARDS */
.report-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:16px;margin-bottom:10px;
}
.report-card.resolved{border-color:rgba(29,185,106,.3)}
.report-card.closed{border-color:rgba(74,85,104,.3);opacity:.75}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.rc-cat{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;color:var(--heading)}
.badge{font-size:.62rem;padding:3px 9px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.badge.p{background:rgba(240,165,0,.12);color:var(--gold);border:1px solid rgba(240,165,0,.28)}
.badge.r{background:rgba(29,185,106,.12);color:var(--success);border:1px solid rgba(29,185,106,.28)}
.badge.c{background:rgba(74,85,104,.12);color:var(--muted);border:1px solid var(--border)}
.rc-desc{font-size:.85rem;color:var(--text);margin-bottom:8px;line-height:1.6;white-space:pre-wrap}
.rc-meta{font-size:.7rem;color:var(--muted)}
.rep-answers{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.rep-answer-item{background:var(--bg);border-left:2px solid var(--accent2);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:8px;font-size:.83rem}
.rep-answer-item.staff{border-left-color:var(--gold)}
.rep-answer-author{color:var(--accent);font-weight:600;font-size:.72rem;margin-bottom:3px}
.rep-answer-text{color:var(--text);line-height:1.5;white-space:pre-wrap}
.rep-answer-date{font-size:.65rem;color:var(--muted);margin-top:3px}
.mod-controls{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}

/* QUESTIONS */
.question-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:18px;margin-bottom:12px}
.q-title{font-family:'Rajdhani',sans-serif;font-size:1.08rem;font-weight:700;color:var(--heading);margin-bottom:6px}
.q-meta{font-size:.7rem;color:var(--muted);margin-bottom:10px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.q-body{font-size:.87rem;color:var(--text);line-height:1.65;margin-bottom:12px;white-space:pre-wrap}
.spill{font-size:.62rem;padding:2px 8px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.spill.open{background:rgba(0,144,179,.18);color:#60d0f0;border:1px solid rgba(0,144,179,.35)}
.spill.resolved{background:rgba(29,185,106,.12);color:var(--success);border:1px solid rgba(29,185,106,.28)}
.spill.closed{background:rgba(74,85,104,.18);color:var(--muted);border:1px solid var(--border)}
.rep-sec{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.rep-item{background:var(--bg);border-left:2px solid var(--border);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:8px;font-size:.83rem}
.rep-item.priv{border-left-color:var(--accent)}
.rep-author{color:var(--accent);font-weight:600;font-size:.72rem;margin-bottom:3px}
.rep-text{color:var(--text);line-height:1.5}
.rep-date{font-size:.65rem;color:var(--muted);margin-top:3px}

/* CHAT */
#chatBox{background:var(--bg);border:1px solid var(--border);border-radius:8px;height:420px;overflow-y:auto;padding:14px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.chat-msg{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px}
.chat-author{font-size:.7rem;color:var(--accent);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chat-text{font-size:.87rem;color:var(--text);line-height:1.5}
.chat-time{font-size:.65rem;color:var(--muted);margin-top:4px}
.chat-row{display:flex;gap:8px;align-items:center}
.chat-row .input-field{margin-bottom:0;flex:1}

/* RULES */
.rules-block{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:12px}
.rules-title{font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.rules-block ol,.rules-block ul{padding-left:18px;line-height:2;color:var(--text);font-size:.88rem}
.rules-block li::marker{color:var(--accent)}
.rules-block strong{color:var(--heading)}

/* ADMIN */
.admin-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.admin-email{font-size:.88rem;color:var(--heading);font-weight:500}
.admin-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px}
.admin-label{font-size:.68rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-family:'Rajdhani',sans-serif;white-space:nowrap}
.role-sel,.donate-sel{padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;cursor:pointer;outline:none}
.role-sel:focus,.donate-sel:focus{border-color:var(--accent)}

/* Роль бейджи */
.role-badge{font-size:.6rem;padding:2px 7px;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.rb-Owner{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.rb-Admin{background:rgba(224,60,60,.15);color:#f87171;border:1px solid rgba(224,60,60,.3)}
.rb-Moder{background:rgba(0,144,179,.15);color:#60d0f0;border:1px solid rgba(0,144,179,.3)}
.rb-Helper{background:rgba(29,185,106,.15);color:#4ade80;border:1px solid rgba(29,185,106,.3)}
.rb-Media{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.rb-YouTube{background:rgba(224,60,60,.15);color:#f87171;border:1px solid rgba(224,60,60,.3)}
.rb-TikTok{background:rgba(0,212,255,.15);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.rb-user{background:rgba(74,85,104,.12);color:var(--muted);border:1px solid var(--border)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px;width:90%;max-width:440px;position:relative;animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-10px) scale(.97)}to{opacity:1;transform:none}}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--heading);margin-bottom:20px}
.close-modal{position:absolute;top:14px;right:16px;font-size:1.3rem;cursor:pointer;color:var(--muted);transition:color .2s}
.close-modal:hover{color:var(--heading)}
.err-text{color:#f87171;font-size:.78rem;margin-top:6px;min-height:18px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:.85rem}
.empty .big{font-family:'Rajdhani',sans-serif;font-size:2.5rem;font-weight:700;color:var(--border);letter-spacing:4px;text-transform:uppercase;display:block;margin-bottom:8px}

.top-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px}

/* Фильтры */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filter-btn{padding:5px 12px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:.72rem;font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--card);border:1px solid var(--accent);border-radius:8px;padding:12px 18px;font-size:.82rem;color:var(--heading);animation:toastIn .2s ease;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* PRIV PANEL */
.priv-lock{
  max-width:380px;margin:60px auto 0;text-align:center;
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:36px 28px;
}
.priv-lock-icon{font-size:2.8rem;margin-bottom:12px}
.priv-lock h3{font-family:'Rajdhani',sans-serif;font-size:1.2rem;letter-spacing:2px;text-transform:uppercase;color:var(--heading);margin-bottom:6px}
.priv-lock p{font-size:.8rem;color:var(--muted);margin-bottom:20px}
.priv-grant-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:18px 20px;margin-bottom:10px;
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;
}
.priv-grant-card .pge{flex:1;min-width:140px;font-size:.87rem;color:var(--heading);font-weight:500;word-break:break-all}
.priv-grant-card .pgrole{font-size:.7rem;color:var(--muted);margin-top:2px}
.priv-role-sel{padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.82rem;cursor:pointer;outline:none}
.priv-role-sel:focus{border-color:var(--accent)}
.priv-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.priv-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px 18px;flex:1;min-width:100px;text-align:center}
.priv-stat-val{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:var(--accent)}
.priv-stat-lbl{font-size:.65rem;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.priv-search{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.priv-search .input-field{margin-bottom:0;flex:1}

@media(max-width:600px){
  .tabs{padding:0 8px}
  .tab-btn{padding:12px 10px;font-size:.72rem}
  #mainContent{padding:16px 10px}
  .modal-content{padding:18px}
}
</style>
</head>
<body>

<nav class="navbar">
  <button id="menuToggle" aria-label="Меню"><span></span><span></span><span></span></button>
  <div class="logo">Power<span>World</span></div>
  <div style="width:40px"></div>
</nav>

<div id="menuOverlay"></div>
<div id="sideMenu">
  <div class="side-logo">PowerWorld</div>
  <div class="side-label">Аккаунт</div>
  <div id="userInfo">Не авторизован</div>
  <hr class="side-hr">
  <div id="authButtons"></div>
  <hr class="side-hr">
  <div class="side-label">Навигация</div>
  <button class="menu-btn" id="sNav1">Жалобы</button>
  <button class="menu-btn" id="sNav2">Вопросы</button>
  <button class="menu-btn" id="sNavChat" style="display:none">Чат персонала</button>
  <button class="menu-btn" id="sNav3">Правила</button>
  <button class="menu-btn" id="sNavAdmin" style="display:none">Администрирование</button>
  <button class="menu-btn" id="sNavPriv">Админ панель</button>
</div>

<div class="tabs">
  <button class="tab-btn" id="tabReports">Жалобы</button>
  <button class="tab-btn" id="tabQuestions">Вопросы</button>
  <button class="tab-btn" id="tabChat" style="display:none">Чат</button>
  <button class="tab-btn" id="tabRules">Правила</button>
  <button class="tab-btn" id="tabAdmin" style="display:none">Админ</button>
</div>

<div id="mainContent"></div>

function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg, type){
  var t = document.createElement('div');
  t.className = 'toast';
  if(type==='success') t.style.borderColor = 'var(--success)';
  if(type==='danger')  t.style.borderColor = 'var(--danger)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}
function roleBadge(role){
  var label = RL[role] || role;
  return '<span class="role-badge rb-'+(role||'user')+'">'+esc(label)+'</span>';
}
function donateBadge(don){
  if(!don || don==='Нет') return '';
  return '<span class="donate-badge-inline">⭐ '+esc(don)+'</span>';
}

// ── Auth ───────────────────────────────────────────────────────
auth.onAuthStateChanged(function(user){
  if(user){
    CU = user;
    db.collection('users').doc(user.uid).get().then(function(snap){
      if(snap.exists){
        CUR  = snap.data().role   || 'user';
        CDON = snap.data().donate || 'Нет';
      } else {
        CUR='user'; CDON='Нет';
      }
      syncUI();
    });
  } else {
    CU=null; CUR='user'; CDON='Нет';
    syncUI();
  }
});

function syncUI(){
  var isPriv  = CU && PRIV.indexOf(CUR)  !== -1;
  var isAdmin = CU && ADMIN_ROLES.indexOf(CUR) !== -1;

  $('tabChat').style.display    = isPriv  ? 'block' : 'none';
  $('sNavChat').style.display   = isPriv  ? 'block' : 'none';
  $('tabAdmin').style.display   = isAdmin ? 'block' : 'none';
  $('sNavAdmin').style.display  = isAdmin ? 'block' : 'none';

  if(!isPriv  && activeTab==='chat')  activeTab='reports';
  if(!isAdmin && activeTab==='admin') activeTab='reports';

  if(CU){
    $('userInfo').innerHTML =
      '<div style="color:var(--heading);font-size:.88rem;font-weight:500;margin-bottom:5px">'+esc(CU.email)+'</div>'+
      roleBadge(CUR)+
      (CDON&&CDON!=='Нет' ? '<div style="margin-top:6px">'+donateBadge(CDON)+'</div>' : '');
    $('authButtons').innerHTML = '<button class="menu-btn red" id="logoutBtn">Выйти из аккаунта</button>';
    $('logoutBtn').addEventListener('click', function(){ auth.signOut(); });
  } else {
    $('userInfo').innerHTML = '<span style="color:var(--muted);font-size:.85rem">Не авторизован</span>';
    $('authButtons').innerHTML =
      '<button class="menu-btn" id="showReg">Регистрация</button>'+
      '<button class="menu-btn" id="showLogin" style="margin-top:6px">Войти</button>';
    $('showReg').addEventListener('click',   function(){ authModal('register'); closeMenu(); });
    $('showLogin').addEventListener('click', function(){ authModal('login');    closeMenu(); });
  }
  setTab(activeTab);
}

// ── Auth Modal ─────────────────────────────────────────────────
function authModal(mode){
  var existing = $('authModal');
  if(existing) existing.remove();

  document.body.insertAdjacentHTML('beforeend',
    '<div id="authModal" class="modal">'+
      '<div class="modal-content">'+
        '<span class="close-modal">&times;</span>'+
        '<div class="modal-title">'+(mode==='register'?'Регистрация':'Вход в аккаунт')+'</div>'+
        '<input type="email" id="aEmail" placeholder="Email" class="input-field">'+
        '<input type="password" id="aPass" placeholder="Пароль" class="input-field">'+
        '<button id="aSubmit" class="btn-primary" style="width:100%">'+(mode==='register'?'Создать аккаунт':'Войти')+'</button>'+
        '<p id="aErr" class="err-text"></p>'+
      '</div>'+
    '</div>'
  );
  var m = $('authModal');
  function close(){ m.remove(); }
  m.querySelector('.close-modal').addEventListener('click', close);
  m.addEventListener('click', function(e){ if(e.target===m) close(); });

  $('aSubmit').addEventListener('click', function(){
    var email = $('aEmail').value.trim();
    var pass  = $('aPass').value;
    var errEl = $('aErr');
    if(!email||!pass){ errEl.textContent='Заполните все поля'; return; }
    if(mode==='register'){
      auth.createUserWithEmailAndPassword(email, pass)
        .then(function(c){
          return db.collection('users').doc(c.user.uid).set({email:email,role:'user',donate:'Нет',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        })
        .then(function(){ close(); })
        .catch(function(e){ errEl.textContent = e.message; });
    } else {
      auth.signInWithEmailAndPassword(email, pass)
        .then(function(){ close(); })
        .catch(function(e){ errEl.textContent = e.message; });
    }
  });
}

// ── Tab switch ─────────────────────────────────────────────────
function setTab(id){
  activeTab = id;
  ['tabReports','tabQuestions','tabChat','tabRules','tabAdmin','tabPrivPanel'].forEach(function(t){
    var el=$(t); if(el) el.classList.remove('active');
  });
  var map = {reports:'tabReports',questions:'tabQuestions',chat:'tabChat',rules:'tabRules',admin:'tabAdmin',privpanel:'tabPrivPanel'};
  if(map[id] && $(map[id])) $(map[id]).classList.add('active');

  if      (id==='reports')   renderReports();
  else if (id==='questions') renderQuestions();
  else if (id==='chat')      renderChat();
  else if (id==='rules')     renderRules();
  else if (id==='admin')     renderAdmin();
  else if (id==='privpanel') renderPrivPanel();
}

// ── REPORTS ────────────────────────────────────────────────────
function renderReports(){
  var canMod = CU && PRIV.indexOf(CUR) !== -1;
  var catOpts = REPORT_CATS.map(function(c){ return '<option value="'+esc(c)+'">'+esc(c)+'</option>'; }).join('');

  var filters = ['all','pending','resolved','closed'];
  var filterLabels = {all:'Все',pending:'Ожидает',resolved:'Решено',closed:'Закрыто'};
  var filterHtml = filters.map(function(f){
    return '<button class="filter-btn'+(repFilter===f?' active':'') + '" data-f="'+f+'">'+filterLabels[f]+'</button>';
  }).join('');

  $('mainContent').innerHTML =
    '<div class="sec-h"><h2>Жалобы и обращения</h2><div class="sub">Подайте жалобу или обращение к администрации</div></div>'+
    (CU ?
      '<div class="panel">'+
        '<div class="panel-label">Новое обращение</div>'+
        '<select id="repCat" class="input-field">'+catOpts+'</select>'+
        '<input id="repTarget" placeholder="Ник нарушителя / сотрудника (необязательно)" class="input-field">'+
        '<textarea id="repDesc" placeholder="Подробно опишите ситуацию..." rows="4" class="input-field"></textarea>'+
        '<button id="sendRep" class="btn-primary">Отправить обращение</button>'+
      '</div>'
    :
      '<div class="panel" style="text-align:center;padding:28px">'+
        '<div style="color:var(--muted);font-size:.88rem;margin-bottom:12px">Войдите чтобы подать обращение</div>'+
        '<button class="btn-secondary" id="loginForRep">Войти / Зарегистрироваться</button>'+
      '</div>'
    )+
    '<div style="margin-top:24px;margin-bottom:12px"><div class="sec-h" style="margin-bottom:10px"><h2>Список обращений</h2></div>'+
    '<div class="filter-row"><span style="font-size:.7rem;color:var(--muted);letter-spacing:1px;font-family:Rajdhani,sans-serif;text-transform:uppercase">Фильтр:</span>'+filterHtml+'</div></div>'+
    '<div id="repList"></div>';

  // Фильтры
  $('mainContent').querySelectorAll('.filter-btn').forEach(function(b){
    b.addEventListener('click', function(){
      repFilter = b.dataset.f;
      renderReports();
    });
  });

  if(!CU){
    var lBtn = $('loginForRep');
    if(lBtn) lBtn.addEventListener('click', function(){ authModal('login'); });
    $('repList').innerHTML = '<div class="empty"><span class="big">LOCK</span>Войдите чтобы видеть обращения</div>';
    return;
  }

  // Кнопка отправки
  $('sendRep').addEventListener('click', function(){
    var cat    = $('repCat').value;
    var target = $('repTarget').value.trim();
    var desc   = $('repDesc').value.trim();
    if(!desc){ toast('Введите описание','danger'); return; }
    db.collection('reports').add({
      category: cat,
      targetNick: target,
      description: desc,
      userId: CU.uid,
      userEmail: CU.email,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'pending',
      replies: []
    }).then(function(){
      $('repDesc').value = '';
      $('repTarget').value = '';
      toast('Обращение отправлено!','success');
    }).catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
  });

  // Слушатель жалоб
  if(unsubRep) unsubRep();
  var q;
  if(canMod){
    q = db.collection('reports').orderBy('timestamp','desc');
  } else {
    q = db.collection('reports').where('userId','==',CU.uid).orderBy('timestamp','desc');
  }

  unsubRep = q.onSnapshot(function(snap){
    var el = $('repList'); if(!el) return;
    var docs = [];
    snap.forEach(function(ds){ docs.push(Object.assign({id:ds.id}, ds.data())); });

    if(repFilter!=='all') docs = docs.filter(function(d){ return d.status===repFilter; });

    if(!docs.length){ el.innerHTML='<div class="empty"><span class="big">NONE</span>Обращений нет</div>'; return; }

    var h = '';
    docs.forEach(function(d){
      var id = d.id;
      var date = d.timestamp ? d.timestamp.toDate().toLocaleString('ru') : 'только что';
      var status = d.status || 'pending';
      var statusLabel = {pending:'Ожидает',resolved:'Решено',closed:'Закрыто'}[status] || status;
      var bc = {pending:'p',resolved:'r',closed:'c'}[status] || 'p';
      var replies = d.replies || [];

      var repliesHtml = '';
      if(replies.length){
        repliesHtml = '<div class="rep-answers"><div style="font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-family:Rajdhani,sans-serif;margin-bottom:8px">Ответы ('+replies.length+')</div>';
        replies.forEach(function(r){
          repliesHtml += '<div class="rep-answer-item'+(r.isStaff?' staff':'')+'">'+
            '<div class="rep-answer-author">'+esc(r.authorEmail)+' '+roleBadge(r.authorRole)+(r.authorDonate&&r.authorDonate!=='Нет'?' '+donateBadge(r.authorDonate):'')+'</div>'+
            '<div class="rep-answer-text">'+esc(r.content)+'</div>'+
            '<div class="rep-answer-date">'+new Date(r.createdAt).toLocaleString('ru')+'</div>'+
          '</div>';
        });
        repliesHtml += '</div>';
      }

      var modCtrl = '';
      if(canMod){
        modCtrl = '<div class="mod-controls">'+
          '<textarea id="ra-'+id+'" placeholder="Ответ на обращение..." rows="2" class="input-field" style="margin-bottom:6px"></textarea>'+
          '<button class="btn-sm g rep-reply" data-id="'+id+'">Ответить</button>'+
          (status!=='resolved' ? '<button class="btn-sm g rep-resolve" data-id="'+id+'">✓ Решено</button>' : '')+
          (status==='pending'  ? '<button class="btn-sm r rep-close"   data-id="'+id+'">✕ Закрыть</button>' : '')+
          (status==='closed'   ? '<button class="btn-sm y rep-open"    data-id="'+id+'">↺ Открыть</button>' : '')+
        '</div>';
      } else if(status==='pending' && CU && d.userId===CU.uid){
        modCtrl = '<div class="mod-controls">'+
          '<textarea id="ra-'+id+'" placeholder="Добавить информацию..." rows="2" class="input-field" style="margin-bottom:6px"></textarea>'+
          '<button class="btn-sm rep-reply" data-id="'+id+'">Добавить</button>'+
        '</div>';
      }

      h += '<div class="report-card '+status+'">'+
        '<div class="rc-top"><span class="rc-cat">'+esc(d.category)+'</span><span class="badge '+bc+'">'+statusLabel+'</span></div>'+
        (d.targetNick ? '<div style="font-size:.75rem;color:var(--muted);margin-bottom:6px">Игрок: <span style="color:var(--text)">'+esc(d.targetNick)+'</span></div>' : '')+
        '<div class="rc-desc">'+esc(d.description)+'</div>'+
        '<div class="rc-meta">'+esc(d.userEmail)+' &bull; '+date+'</div>'+
        repliesHtml + modCtrl +
      '</div>';
    });
    el.innerHTML = h;

    // Навешиваем обработчики
    el.querySelectorAll('.rep-reply').forEach(function(b){
      b.addEventListener('click', function(){
        var id  = b.dataset.id;
        var txt = $(('ra-'+id)) ? $('ra-'+id).value.trim() : '';
        if(!txt){ toast('Введите текст','danger'); return; }
        var isStaff = PRIV.indexOf(CUR) !== -1;
        db.collection('reports').doc(id).update({
          replies: firebase.firestore.FieldValue.arrayUnion({
            authorId:    CU.uid,
            authorEmail: CU.email,
            authorRole:  CUR,
            authorDonate:CDON,
            content:     txt,
            createdAt:   new Date().toISOString(),
            isStaff:     isStaff
          })
        }).then(function(){ toast('Ответ добавлен','success'); $('ra-'+id).value=''; })
          .catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
      });
    });
    el.querySelectorAll('.rep-resolve').forEach(function(b){
      b.addEventListener('click', function(){
        db.collection('reports').doc(b.dataset.id).update({status:'resolved'})
          .then(function(){ toast('Помечено как решённое','success'); })
          .catch(function(e){ toast(e.message,'danger'); });
      });
    });
    el.querySelectorAll('.rep-close').forEach(function(b){
      b.addEventListener('click', function(){
        db.collection('reports').doc(b.dataset.id).update({status:'closed'})
          .then(function(){ toast('Обращение закрыто'); })
          .catch(function(e){ toast(e.message,'danger'); });
      });
    });
    el.querySelectorAll('.rep-open').forEach(function(b){
      b.addEventListener('click', function(){
        db.collection('reports').doc(b.dataset.id).update({status:'pending'})
          .then(function(){ toast('Обращение открыто'); })
          .catch(function(e){ toast(e.message,'danger'); });
      });
    });
  });
}

// ── QUESTIONS ──────────────────────────────────────────────────
function renderQuestions(){
  $('mainContent').innerHTML =
    '<div class="top-row">'+
      '<div class="sec-h" style="margin-bottom:0"><h2>Вопросы</h2><div class="sub">Задайте вопрос сообществу</div></div>'+
      (CU ? '<button id="newQBtn" class="btn-secondary">+ Создать вопрос</button>' : '<span style="font-size:.8rem;color:var(--muted)">Войдите чтобы создать вопрос</span>')+
    '</div>'+
    '<div id="qList"></div>';

  if($('newQBtn')) $('newQBtn').addEventListener('click', qModal);

  if(unsubQ) unsubQ();
  unsubQ = db.collection('forumQuestions').orderBy('createdAt','desc').onSnapshot(function(snap){
    var el = $('qList'); if(!el) return;
    if(snap.empty){ el.innerHTML='<div class="empty"><span class="big">VOID</span>Вопросов пока нет</div>'; return; }
    var canMod = CU && PRIV.indexOf(CUR)!==-1;
    var h = '';
    snap.forEach(function(ds){
      var d=ds.data(), id=ds.id, status=d.status||'open';
      var replies=d.replies||[];
      var date=d.createdAt ? d.createdAt.toDate().toLocaleString('ru') : 'только что';
      var sLabel={open:'Открыт',resolved:'Решён',closed:'Закрыт'}[status]||status;

      var repsHtml = replies.map(function(r){
        return '<div class="rep-item'+(r.isPrivilegedReply?' priv':'')+'">'+
          '<div class="rep-author">'+esc(r.authorName)+' '+roleBadge(r.authorRole)+(r.authorDonate&&r.authorDonate!=='Нет'?' '+donateBadge(r.authorDonate):'')+'</div>'+
          '<div class="rep-text">'+esc(r.content)+'</div>'+
          '<div class="rep-date">'+new Date(r.createdAt).toLocaleString('ru')+'</div>'+
        '</div>';
      }).join('');

      h += '<div class="question-card">'+
        '<div class="q-title">'+esc(d.title)+'</div>'+
        '<div class="q-meta"><span>'+esc(d.authorEmail)+'</span><span>'+date+'</span><span class="spill '+status+'">'+sLabel+'</span></div>'+
        '<div class="q-body">'+esc(d.body)+'</div>'+
        '<div class="rep-sec">'+
          '<div id="ri-'+id+'">'+repsHtml+'</div>'+
          (canMod ?
            '<textarea id="rt-'+id+'" placeholder="Ответ персонала..." rows="2" class="input-field" style="margin-top:10px"></textarea>'+
            '<button class="btn-sm reply-p" data-id="'+id+'">Ответить</button>'+
            (status!=='resolved' ? '<button class="btn-sm g rq-resolve" data-id="'+id+'">✓ Решить</button>' : '')+
            (status==='open'     ? '<button class="btn-sm r rq-close"   data-id="'+id+'">✕ Закрыть</button>' : '')+
            (status==='closed'   ? '<button class="btn-sm y rq-open"    data-id="'+id+'">↺ Открыть</button>' : '')
          :
            (CU ? '<textarea id="ur-'+id+'" placeholder="Ваш ответ..." rows="2" class="input-field" style="margin-top:10px"></textarea><button class="btn-sm user-r" data-id="'+id+'">Ответить</button>' : '')
          )+
        '</div>'+
      '</div>';
    });
    el.innerHTML = h;

    el.querySelectorAll('.reply-p').forEach(function(b){
      b.addEventListener('click', function(){
        var id=b.dataset.id, txt=$('rt-'+id)?$('rt-'+id).value.trim():'';
        if(!txt){toast('Введите текст','danger');return;}
        addQRep(id,txt,true);
        $('rt-'+id).value='';
      });
    });
    el.querySelectorAll('.user-r').forEach(function(b){
      b.addEventListener('click', function(){
        var id=b.dataset.id, txt=$('ur-'+id)?$('ur-'+id).value.trim():'';
        if(!txt){toast('Введите текст','danger');return;}
        addQRep(id,txt,false);
        $('ur-'+id).value='';
      });
    });
    el.querySelectorAll('.rq-resolve').forEach(function(b){
      b.addEventListener('click', function(){ setQSt(b.dataset.id,'resolved'); });
    });
    el.querySelectorAll('.rq-close').forEach(function(b){
      b.addEventListener('click', function(){ setQSt(b.dataset.id,'closed'); });
    });
    el.querySelectorAll('.rq-open').forEach(function(b){
      b.addEventListener('click', function(){ setQSt(b.dataset.id,'open'); });
    });
  });
}

function addQRep(qId,content,isPriv){
  if(!CU){toast('Войдите в аккаунт','danger');return;}
  db.collection('forumQuestions').doc(qId).update({
    replies: firebase.firestore.FieldValue.arrayUnion({
      authorId:CU.uid, authorName:CU.email, authorRole:CUR,
      authorDonate:CDON, content:content,
      createdAt:new Date().toISOString(), isPrivilegedReply:isPriv
    })
  }).then(function(){ toast('Ответ добавлен','success'); })
    .catch(function(e){ toast(e.message,'danger'); });
}
function setQSt(qId,status){
  if(!CU||PRIV.indexOf(CUR)===-1){toast('Недостаточно прав','danger');return;}
  db.collection('forumQuestions').doc(qId).update({status:status})
    .then(function(){ toast('Статус обновлён'); })
    .catch(function(e){ toast(e.message,'danger'); });
}

function qModal(){
  var ex=$('qModal'); if(ex)ex.remove();
  document.body.insertAdjacentHTML('beforeend',
    '<div id="qModal" class="modal">'+
      '<div class="modal-content">'+
        '<span class="close-modal">&times;</span>'+
        '<div class="modal-title">Новый вопрос</div>'+
        '<input id="qT" placeholder="Заголовок" class="input-field">'+
        '<textarea id="qB" placeholder="Описание вопроса..." rows="5" class="input-field"></textarea>'+
        '<button id="qCreate" class="btn-primary" style="width:100%">Опубликовать</button>'+
        '<p id="qErr" class="err-text"></p>'+
      '</div>'+
    '</div>'
  );
  var m=$('qModal');
  function close(){ m.remove(); }
  m.querySelector('.close-modal').addEventListener('click',close);
  m.addEventListener('click',function(e){ if(e.target===m)close(); });
  $('qCreate').addEventListener('click',function(){
    var title=$('qT').value.trim(), body=$('qB').value.trim(), err=$('qErr');
    if(!title||!body){err.textContent='Заполните все поля';return;}
    db.collection('forumQuestions').add({
      title:title, body:body,
      authorId:CU.uid, authorEmail:CU.email,
      createdAt:firebase.firestore.FieldValue.serverTimestamp(),
      status:'open', replies:[]
    }).then(function(){ close(); toast('Вопрос опубликован','success'); })
      .catch(function(e){ err.textContent=e.message; });
  });
}

// ── CHAT ───────────────────────────────────────────────────────
function renderChat(){
  if(!CU || PRIV.indexOf(CUR)===-1){
    $('mainContent').innerHTML='<div class="empty"><span class="big">LOCK</span>Доступ только для персонала</div>';
    return;
  }
  $('mainContent').innerHTML=
    '<div class="sec-h"><h2>Чат персонала</h2><div class="sub">Приватный канал — Owner · Admin · Moder · Helper · Media · YouTube · TikTok</div></div>'+
    '<div class="panel">'+
      '<div id="chatBox"></div>'+
      '<div class="chat-row">'+
        '<input id="chatInp" class="input-field" placeholder="Сообщение...">'+
        '<button id="chatSend" class="btn-primary">Отправить</button>'+
      '</div>'+
    '</div>';

  if(unsubChat) unsubChat();
  unsubChat = db.collection('staffChat').orderBy('createdAt','asc').onSnapshot(function(snap){
    var box=$('chatBox'); if(!box) return;
    box.innerHTML='';
    snap.forEach(function(ds){
      var d=ds.data();
      var div=document.createElement('div');
      div.className='chat-msg';
      div.innerHTML=
        '<div class="chat-author">'+esc(d.authorEmail)+' '+roleBadge(d.authorRole)+(d.authorDonate&&d.authorDonate!=='Нет'?' '+donateBadge(d.authorDonate):'')+'</div>'+
        '<div class="chat-text">'+esc(d.text)+'</div>'+
        '<div class="chat-time">'+(d.createdAt?d.createdAt.toDate().toLocaleString('ru'):'')+'</div>';
      box.appendChild(div);
    });
    box.scrollTop=box.scrollHeight;
  });

  function sendMsg(){
    var inp=$('chatInp'), text=inp?inp.value.trim():'';
    if(!text) return;
    inp.value='';
    db.collection('staffChat').add({
      text:text, authorId:CU.uid, authorEmail:CU.email,
      authorRole:CUR, authorDonate:CDON,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }
  $('chatSend').addEventListener('click', sendMsg);
  $('chatInp').addEventListener('keydown', function(e){
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
  });
}

// ── ADMIN ──────────────────────────────────────────────────────
function renderAdmin(){
  if(!CU || ADMIN_ROLES.indexOf(CUR)===-1){
    $('mainContent').innerHTML='<div class="empty"><span class="big">LOCK</span>Доступ запрещён</div>';
    return;
  }
  $('mainContent').innerHTML=
    '<div class="sec-h"><h2>Администрирование</h2><div class="sub">Управление ролями и донатом пользователей</div></div>'+
    '<div id="adminList"><div class="empty"><span class="big">...</span>Загрузка</div></div>';

  db.collection('users').get().then(function(snap){
    var el=$('adminList'); if(!el) return;
    if(snap.empty){ el.innerHTML='<div class="empty"><span class="big">NONE</span>Нет пользователей</div>'; return; }

    var h='';
    snap.forEach(function(ds){
      var u=ds.data(), uid=ds.id;
      var roleOpts=Object.keys(RL).map(function(v){
        return '<option value="'+v+'"'+(u.role===v?' selected':'')+'>'+esc(RL[v])+'</option>';
      }).join('');
      var donOpts=DONATE_LIST.map(function(d){
        return '<option value="'+d+'"'+((u.donate||'Нет')===d?' selected':'')+'>'+d+'</option>';
      }).join('');

      h+='<div class="admin-card">'+
        '<div class="admin-email">'+esc(u.email||uid)+'</div>'+
        '<div style="margin-top:4px">'+roleBadge(u.role||'user')+(u.donate&&u.donate!=='Нет'?' '+donateBadge(u.donate):'')+'</div>'+
        '<div class="admin-row">'+
          '<span class="admin-label">Роль:</span>'+
          '<select class="role-sel" data-uid="'+uid+'">'+roleOpts+'</select>'+
          '<button class="btn-sm save-r" data-uid="'+uid+'">Сохранить</button>'+
        '</div>'+
        '<div class="admin-row" style="margin-top:8px">'+
          '<span class="admin-label">Донат:</span>'+
          '<select class="donate-sel" data-uid="'+uid+'">'+donOpts+'</select>'+
          '<button class="btn-sm save-d" data-uid="'+uid+'">Сохранить</button>'+
        '</div>'+
      '</div>';
    });
    el.innerHTML=h;

    el.querySelectorAll('.save-r').forEach(function(b){
      b.addEventListener('click',function(){
        var sel=el.querySelector('.role-sel[data-uid="'+b.dataset.uid+'"]');
        db.collection('users').doc(b.dataset.uid).update({role:sel.value})
          .then(function(){
            toast('Роль обновлена','success');
            if(b.dataset.uid===CU.uid){ CUR=sel.value; syncUI(); } else renderAdmin();
          }).catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
      });
    });

    el.querySelectorAll('.save-d').forEach(function(b){
      b.addEventListener('click',function(){
        var sel=el.querySelector('.donate-sel[data-uid="'+b.dataset.uid+'"]');
        db.collection('users').doc(b.dataset.uid).update({donate:sel.value})
          .then(function(){
            toast('Донат обновлён','success');
            if(b.dataset.uid===CU.uid){ CDON=sel.value; syncUI(); } else renderAdmin();
          }).catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
      });
    });
  }).catch(function(e){
    $('adminList').innerHTML='<div class="empty" style="color:var(--danger)">Ошибка: '+esc(e.message)+'</div>';
  });
}

// ── PRIV PANEL ────────────────────────────────────────────────
var PRIV_PANEL_PASS   = '0013Da2S1@';
var privPanelUnlocked = false;
var privPanelUnsubUsers = null;
var privPanelSearch = '';

var PRIV_ROLES = ['Moder','Helper','Owner','Media','YouTube'];
var PRIV_ROLE_LABELS = {
  Moder:'Модератор', Helper:'Хелпер', Owner:'Владелец',
  Media:'Медиа', YouTube:'Ютубер', user:'Пользователь'
};

function renderPrivPanel(){
  if(!privPanelUnlocked){
    $('mainContent').innerHTML =
      '<div class="priv-lock">'+
        '<div class="priv-lock-icon" style="font-size:2rem;color:var(--accent);font-family:Rajdhani,sans-serif;font-weight:700;letter-spacing:3px">ADMIN</div>'+
        '<h3>Админ панель</h3>'+
        '<p>Введите пароль для доступа к панели выдачи привилегий</p>'+
        '<input type="password" id="ppPass" class="input-field" placeholder="Пароль..." style="text-align:center;margin-bottom:8px">'+
        '<button id="ppEnter" class="btn-primary" style="width:100%">Войти</button>'+
        '<p id="ppErr" class="err-text" style="text-align:center;margin-top:8px"></p>'+
      '</div>';
    $('ppEnter').addEventListener('click', function(){
      if($('ppPass').value === PRIV_PANEL_PASS){
        privPanelUnlocked = true;
        renderPrivPanel();
      } else {
        $('ppErr').textContent = 'Неверный пароль';
        $('ppPass').value = '';
        $('ppPass').focus();
      }
    });
    $('ppPass').addEventListener('keydown', function(e){ if(e.key==='Enter') $('ppEnter').click(); });
    return;
  }

  // Панель открыта
  $('mainContent').innerHTML =
    '<div class="sec-h"><h2>Админ панель</h2><div class="sub">Выдача и управление привилегиями пользователей</div></div>'+
    '<div id="ppStats" class="priv-stats"></div>'+
    '<div class="priv-search">'+
      '<input id="ppSearch" class="input-field" placeholder="Поиск по email...">'+
      '<button id="ppLock" class="btn-sm r" title="Заблокировать панель">Выйти</button>'+
    '</div>'+
    '<div id="ppList"><div class="empty"><span class="big">...</span>Загрузка</div></div>';

  $('ppLock').addEventListener('click', function(){
    privPanelUnlocked = false;
    renderPrivPanel();
  });
  $('ppSearch').addEventListener('input', function(){
    privPanelSearch = this.value.toLowerCase();
    renderPrivUsers();
  });

  function renderPrivUsers(){
    // triggered after snap loaded
  }

  if(privPanelUnsubUsers) privPanelUnsubUsers();
  var allUsers = [];

  privPanelUnsubUsers = db.collection('users').onSnapshot(function(snap){
    allUsers = [];
    snap.forEach(function(ds){ allUsers.push(Object.assign({_uid: ds.id}, ds.data())); });

    // Stats
    var counts = {Moder:0, Helper:0, Owner:0, Media:0, YouTube:0, user:0};
    allUsers.forEach(function(u){
      var r = u.role || 'user';
      if(counts[r] !== undefined) counts[r]++;
      else counts.user++;
    });
    var statsEl = $('ppStats');
    if(statsEl) statsEl.innerHTML =
      '<div class="priv-stat"><div class="priv-stat-val">'+allUsers.length+'</div><div class="priv-stat-lbl">Всего</div></div>'+
      '<div class="priv-stat"><div class="priv-stat-val" style="color:#c084fc">'+counts.Owner+'</div><div class="priv-stat-lbl">Owner</div></div>'+
      '<div class="priv-stat"><div class="priv-stat-val" style="color:#60d0f0">'+counts.Moder+'</div><div class="priv-stat-lbl">Moder</div></div>'+
      '<div class="priv-stat"><div class="priv-stat-val" style="color:#4ade80">'+counts.Helper+'</div><div class="priv-stat-lbl">Helper</div></div>'+
      '<div class="priv-stat"><div class="priv-stat-val" style="color:#fb923c">'+counts.Media+'</div><div class="priv-stat-lbl">Media</div></div>'+
      '<div class="priv-stat"><div class="priv-stat-val" style="color:#f87171">'+counts.YouTube+'</div><div class="priv-stat-lbl">YouTube</div></div>';

    // List
    var el = $('ppList');
    if(!el) return;
    var filtered = allUsers.filter(function(u){
      return !privPanelSearch || (u.email||'').toLowerCase().indexOf(privPanelSearch) !== -1;
    });
    if(!filtered.length){ el.innerHTML='<div class="empty"><span class="big">NONE</span>Пользователей не найдено</div>'; return; }

    var h = '';
    filtered.forEach(function(u){
      var uid = u._uid;
      var roleOpts = ['user','Moder','Helper','Owner','Media','YouTube'].map(function(r){
        return '<option value="'+r+'"'+(( u.role||'user')===r?' selected':'')+'>'+esc(PRIV_ROLE_LABELS[r]||r)+'</option>';
      }).join('');

      h += '<div class="priv-grant-card">'+
        '<div>'+
          '<div class="pge">'+esc(u.email||uid)+'</div>'+
          '<div class="pgrole">'+roleBadge(u.role||'user')+(u.donate&&u.donate!=='Нет'?' '+donateBadge(u.donate):'')+'</div>'+
        '</div>'+
        '<select class="priv-role-sel pp-sel" data-uid="'+uid+'" title="Выберите роль">'+roleOpts+'</select>'+
        '<button class="btn-sm pp-save" data-uid="'+uid+'" style="margin-top:0">Применить</button>'+
        '<button class="btn-sm r pp-reset" data-uid="'+uid+'" style="margin-top:0">Снять</button>'+
      '</div>';
    });
    el.innerHTML = h;

    el.querySelectorAll('.pp-save').forEach(function(b){
      b.addEventListener('click', function(){
        var sel = el.querySelector('.pp-sel[data-uid="'+b.dataset.uid+'"]');
        db.collection('users').doc(b.dataset.uid).update({role: sel.value})
          .then(function(){
            toast('Привилегия выдана: '+esc(PRIV_ROLE_LABELS[sel.value]||sel.value),'success');
            if(CU && b.dataset.uid===CU.uid){ CUR=sel.value; syncUI(); }
          })
          .catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
      });
    });
    el.querySelectorAll('.pp-reset').forEach(function(b){
      b.addEventListener('click', function(){
        db.collection('users').doc(b.dataset.uid).update({role:'user'})
          .then(function(){
            toast('Привилегия снята','success');
            if(CU && b.dataset.uid===CU.uid){ CUR='user'; syncUI(); }
          })
          .catch(function(e){ toast('Ошибка: '+e.message,'danger'); });
      });
    });
  });
}
